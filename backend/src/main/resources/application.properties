# Datasource - accepts either SPRING_DATASOURCE_URL or DATABASE_URL (jdbc expected)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:cesuoyunwei;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable SOAP by default for local dev. Enable with `-Dsoap.enabled=true` or set soap.enabled=true in production profile
soap.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Azure Blob settings
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container=${AZURE_STORAGE_CONTAINER:images}

# Optional Azure AD issuer (set to enable JWT validation). Example: https://login.microsoftonline.com/<tenant>/v2.0
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI:}
